name                = "coffee-webhook"
main                = "src/index.ts"
compatibility_date  = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding       = "DB"
database_name = "coffee-db"
database_id   = "PASTE_YOUR_D1_ID_HERE"

[[kv_namespaces]]
binding    = "SESSIONS"
id         = "PASTE_YOUR_KV_PRODUCTION_ID_HERE"
preview_id = "PASTE_YOUR_KV_PREVIEW_ID_HERE"

[vars]
ENVIRONMENT = "production"

[env.local]
[env.local.vars]
ENVIRONMENT = "local"

[[env.local.d1_databases]]
binding       = "DB"
database_name = "coffee-db"
database_id   = "PASTE_YOUR_D1_ID_HERE"

[[env.local.kv_namespaces]]
binding     = "SESSIONS"
id          = "PASTE_YOUR_KV_PRODUCTION_ID_HERE"
preview_id  = "PASTE_YOUR_KV_PREVIEW_ID_HERE"
