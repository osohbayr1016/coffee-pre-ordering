name                = "coffee-api"
main                = "src/index.ts"
compatibility_date  = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── D1 Database ──────────────────────────────────────
[[d1_databases]]
binding       = "DB"
database_name = "coffee-db"
database_id   = "PASTE_YOUR_D1_ID_HERE"    # ← Phase 2-д авсан ID
migrations_dir = "../../packages/db/migrations"

# ── R2 Bucket ────────────────────────────────────────
[[r2_buckets]]
binding     = "IMAGES"
bucket_name = "coffee-images"

# ── KV Namespaces ────────────────────────────────────
[[kv_namespaces]]
binding     = "SESSIONS"
id          = "PASTE_YOUR_KV_PRODUCTION_ID_HERE"
preview_id  = "PASTE_YOUR_KV_PREVIEW_ID_HERE"

# ── Environment Variables ────────────────────────────
[vars]
ENVIRONMENT  = "production"
CORS_ORIGIN  = "https://yourapp.mn"

# ── Local dev env ───────────────────────────────────
[env.local]
[env.local.vars]
ENVIRONMENT = "local"
CORS_ORIGIN = "http://localhost:5173"

[[env.local.d1_databases]]
binding       = "DB"
database_name = "coffee-db"
database_id   = "PASTE_YOUR_D1_ID_HERE"

[[env.local.r2_buckets]]
binding     = "IMAGES"
bucket_name = "coffee-images"

[[env.local.kv_namespaces]]
binding     = "SESSIONS"
id          = "PASTE_YOUR_KV_PRODUCTION_ID_HERE"
preview_id  = "PASTE_YOUR_KV_PREVIEW_ID_HERE"
