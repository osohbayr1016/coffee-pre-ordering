name                = "coffee-api"
main                = "src/index.ts"
compatibility_date  = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── D1 Database ──────────────────────────────────────
[[d1_databases]]
binding       = "DB"
database_name = "coffee-db"
database_id   = "127e30c5-46ba-4a9d-86f2-b0bedd5f7a81"
migrations_dir = "../../packages/db/migrations"

# ── R2 Bucket ────────────────────────────────────────
[[r2_buckets]]
binding     = "IMAGES"
bucket_name = "coffee-images"

# ── KV Namespaces ────────────────────────────────────
[[kv_namespaces]]
binding     = "SESSIONS"
id          = "b62d21e78e9f4219a7d9cbd007f9b54b"
preview_id  = "3c8704d7c48b407b943cf22a6a9c96ae"

# ── Environment Variables ────────────────────────────
[vars]
ENVIRONMENT  = "production"
CORS_ORIGIN  = "https://coffee-web-dr8.pages.dev"

# ── Local dev env ───────────────────────────────────
[env.local]
[env.local.vars]
ENVIRONMENT = "local"
CORS_ORIGIN = "http://localhost:3000"

[[env.local.d1_databases]]
binding       = "DB"
database_name = "coffee-db"
database_id   = "127e30c5-46ba-4a9d-86f2-b0bedd5f7a81"

[[env.local.r2_buckets]]
binding     = "IMAGES"
bucket_name = "coffee-images"

[[env.local.kv_namespaces]]
binding     = "SESSIONS"
id          = "b62d21e78e9f4219a7d9cbd007f9b54b"
preview_id  = "3c8704d7c48b407b943cf22a6a9c96ae"

